<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Food Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .success { color: green; font-weight: bold; margin-bottom: 15px; }
        .nav { margin-top: 20px; }
        .nav a { color: #4CAF50; text-decoration: none; }
    </style>
</head>
<body>
<h1>🍽️ Food Tracker</h1>

<p th:if="${message}" class="success" th:text="${message}"></p>

<form th:action="@{/food}" th:object="${foodForm}" method="post">
    <div class="form-group">
        <label>Food Name</label>
        <input type="text" th:field="*{foodName}" placeholder="e.g. Oatmeal" required/>
    </div>
    <div class="form-group">
        <label>Calories</label>
        <input type="number" th:field="*{calories}" placeholder="e.g. 300" required/>
    </div>
    <div class="form-group">
        <label>Meal Time</label>
        <select th:field="*{mealTime}">
            <option th:each="mt : ${mealTimes}"
                    th:value="${mt}"
                    th:text="${mt}">
            </option>
        </select>
    </div>
    <button type="submit">Add Food</button>
</form>

<div class="nav">
    <a href="/food/list">📋 View Food List</a>
</div>
</body>
</html>
