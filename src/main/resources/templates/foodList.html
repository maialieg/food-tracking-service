<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Food List</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; }
        h2 { color: #555; border-bottom: 2px solid #4CAF50; padding-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { background-color: #4CAF50; color: white; padding: 8px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f5f5f5; }
        .empty { color: #999; font-style: italic; }
        .nav a { color: #4CAF50; text-decoration: none; }
        .total { font-weight: bold; color: #333; }
    </style>
</head>
<body>
<h1>📋 Food List</h1>

<div th:each="entry : ${foodByMealTime}">
    <h2 th:text="${entry.key}"></h2>
    <div th:if="${entry.value.empty}" class="empty">No food added yet.</div>
    <table th:unless="${entry.value.empty}">
        <tr>
            <th>Food</th>
            <th>Calories</th>
        </tr>
        <tr th:each="food : ${entry.value}">
            <td th:text="${food.name}"></td>
            <td th:text="${food.calories}"></td>
        </tr>
        <tr class="total">
            <td>Total</td>
            <td th:text="${#aggregates.sum(entry.value.![calories])}"></td>
        </tr>
    </table>
</div>

<div class="nav">
    <a href="/food">➕ Add More Food</a>
</div>
</body>
</html>
